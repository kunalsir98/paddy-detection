<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Paddy Yield Prediction | AI Agri-Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 10% 30%, #0A1F1E, #05100F);
            position: relative;
            overflow-x: hidden;
            padding: 1.5rem;
        }

        /* animated organic grain */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.08"><path fill="none" stroke="%2326a69a" stroke-width="1.2" d="M70 30L85 45 70 60 55 45 70 30z M130 80L150 95 130 110 110 95 130 80z M40 140L58 155 40 170 22 155 40 140z M160 150L175 162 160 174 145 162 160 150z M100 170L112 182 100 194 88 182 100 170z"/><circle cx="35" cy="32" r="3" fill="%2326a69a"/><circle cx="170" cy="45" r="2.5" fill="%2326a69a"/><circle cx="185" cy="120" r="2" fill="%2314b8a6"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
            z-index: 0;
        }

        .hero-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 860px;
            background: rgba(12, 25, 28, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 3rem;
            border: 1px solid rgba(20, 184, 166, 0.35);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(20, 184, 166, 0.2) inset;
            padding: 3rem 2.5rem;
            text-align: center;
            transition: all 0.4s ease;
            animation: floatIn 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes floatIn {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .hero-card:hover {
            border-color: rgba(20, 184, 166, 0.7);
            box-shadow: 0 35px 55px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(6, 182, 212, 0.4) inset;
        }

        h1 {
            font-size: 3.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #E6F7F2, #7DD3C4, #2DD4BF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 1.2rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .subhead {
            font-size: 1.2rem;
            color: #C8E7E1;
            font-weight: 400;
            max-width: 550px;
            margin: 0 auto 2rem auto;
            line-height: 1.5;
            opacity: 0.9;
        }

        .btn-glow {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(105deg, #0F766E, #14B8A6);
            padding: 1rem 2.6rem;
            border-radius: 3rem;
            font-weight: 600;
            font-size: 1.1rem;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1) inset;
            letter-spacing: 0.3px;
        }

        .btn-glow:hover {
            transform: translateY(-5px) scale(1.02);
            background: linear-gradient(105deg, #1A9E8C, #2DD4BF);
            box-shadow: 0 18px 28px -8px rgba(0,0,0,0.4);
        }

        .badge {
            display: inline-block;
            background: rgba(20, 184, 166, 0.2);
            backdrop-filter: blur(4px);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #99F6E4;
            margin-bottom: 1rem;
            border: 0.5px solid #14b8a680;
        }

        @media (max-width: 680px) {
            .hero-card {
                padding: 2rem 1.5rem;
            }
            h1 {
                font-size: 2.4rem;
            }
            .subhead {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="hero-card">
        <div class="badge">🌾 AI · Smart Agriculture</div>
        <h1>Paddy Yield<br>Intelligence</h1>
        <p class="subhead">Precision forecasting powered by machine learning & real‑time agro‑climatic parameters</p>
        <a href="/predict" class="btn-glow">
            <span>✨ Start Prediction</span>
            <span>→</span>
        </a>
    </div>
</body>
</html>
